<div class="popup">
    <div class="avatar">
        <a href="" class="back-link">
          <img src="assets/close.svg" alt="close">
        </a>
    </div>
    <div class="modal-content">
        <h2>Nom Collaborateur</h2>
        </div>
        <app-collaborateur-infos [idE]="1"></app-collaborateur-infos>

    <div class="competence-container">
        <h2 class="competence-title">Compétences</h2>
        
    </div>
    <app-collaboateur-compe [collaborateurId]="collaborateurId"></app-collaboateur-compe>

        <app-add-c (competencesSelected)="onCompetencesSelected($event)"></app-add-c>

    <div class="button-container" >
        <button>Modifier</button>
    </div>
</div>
