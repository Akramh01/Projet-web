<div class="popup">
    <div class="avatar">
        <a href="" class="back-link" (click)="$event.preventDefault(); router.navigate(['/'])">
            <img src="assets/close.svg" alt="close">
        </a>
    </div>
    <div class="modal-content">
        <h2>Nouveau Collaborateur</h2>
    </div>
    <form [formGroup]="employeForm" (ngSubmit)="submitEmploye()">
        <div>
          <label for="prenom">Prénom :</label>
          <input id="prenom" formControlName="prenom" placeholder="Prénom">
        </div>
        <div>
          <label for="nom">Nom :</label>
          <input id="nom" formControlName="nom" placeholder="Nom">
        </div>
        <div>
          <label for="dateEmbauche">Date d'embauche :</label>
          <input type="date" id="dateEmbauche" formControlName="dateEmbauche">
        </div>
        <button type="submit" [disabled]="employeForm.invalid">Confirmer</button>
 </form>
     
        <app-add-c (competencesSelected)="onCompetencesSelected($event)"></app-add-c>
<button>Lier </button>
